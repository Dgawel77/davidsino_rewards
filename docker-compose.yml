services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: davidsino
      POSTGRES_PASSWORD: davidsino_pass
      POSTGRES_DB: davidsino
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U davidsino"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://davidsino:davidsino_pass@db:5432/davidsino
      ADMIN_PIN: ${ADMIN_PIN:-1234}
      WORKER_PIN: ${WORKER_PIN:-5678}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
